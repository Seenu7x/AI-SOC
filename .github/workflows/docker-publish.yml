# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions: Build & Push Docker images to GitHub Container Registry
#
# Triggers on:
#   • Every push to `main`         → tags image as `latest` + git-sha
#   • Every version tag (v*.*.*)   → tags image as the semver version too
#   • Pull requests to `main`      → build-only (no push), validates Dockerfile
#
# Images published:
#   ghcr.io/<owner>/ai-soc-app:latest
#   ghcr.io/<owner>/ai-soc-log-agent:latest
#
# To use:  just push to main. No secrets setup needed — GITHUB_TOKEN is automatic.
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Publish Docker Images

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # github.repository = "owner/repo-name"
  APP_IMAGE:   ghcr.io/${{ github.repository_owner }}/ai-soc-app
  AGENT_IMAGE: ghcr.io/${{ github.repository_owner }}/ai-soc-log-agent

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Set up Docker Buildx (multi-platform builder) ───────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GitHub Container Registry ──────────────────────────────────
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Compute image tags for the APP ──────────────────────────────────────
      - name: Extract metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Build & Push APP image ───────────────────────────────────────────────
      - name: Build and push ai-soc-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Compute image tags for the LOG AGENT ────────────────────────────────
      - name: Extract metadata (log-agent)
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Build & Push LOG AGENT image ─────────────────────────────────────────
      - name: Build and push ai-soc-log-agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.agent
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Build summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.APP_IMAGE }}\` | ${{ steps.meta-app.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.AGENT_IMAGE }}\` | ${{ steps.meta-agent.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
