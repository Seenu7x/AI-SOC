services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: aisoc-db
    environment:
      POSTGRES_USER: aisoc
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aisoc_password}
      POSTGRES_DB: aisoc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aisoc" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (task queue — ready for Phase 2 async jobs) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: aisoc-redis
    ports:
      - "6379:6379"
    mem_limit: 128m
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AI-SOC Application (FastAPI backend + ML engine) ──────────────────────
  app:
    build: .
    container_name: aisoc-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://aisoc:${DB_PASSWORD:-aisoc_password}@db:5432/aisoc_db
      - REDIS_URL=redis://redis:6379/0
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
      - API_RELOAD=False
      # ── Auth secrets (set these in your .env file) ──────────────────────
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-aisoc-admin-2024}
      - ANALYST_PASSWORD=${ANALYST_PASSWORD:-aisoc-analyst-2024}
      - API_KEY=${API_KEY:-aisoc-internal-api-key-change-me}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./data:/app/data
    mem_limit: 1g
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Real-Time Host Log Ingestion Agent ────────────────────────────────────
  # The log agent now runs NATIVELY on the host OS (not in Docker) so it can
  # access platform-specific logs on Linux, Windows, and macOS.
  #
  # Start it manually after the stack is up:
  #   Linux / macOS:  python log_agent.py
  #   Windows:        python log_agent.py
  #                   (or: .\ai-soc.ps1 -StartAgent)
  #
  # Install agent deps:  pip install -r requirements-agent.txt

  # ── Dashboard (Nginx — serves UI + proxies /api and /auth to backend) ─────
  dashboard:
    image: nginx:alpine
    container_name: aisoc-dashboard
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    mem_limit: 128m
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
