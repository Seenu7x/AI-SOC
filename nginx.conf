worker_processes 1;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Rate-limit zone (belt-and-suspenders with app-level limiter) ─────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name _;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"            always;
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header X-XSS-Protection          "1; mode=block"         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), camera=()" always;

        # ── Serve the dashboard SPA ──────────────────────────────────────────
        root  /usr/share/nginx/html;
        index login.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Auth endpoints (tighter rate limit) ─────────────────────────────
        location /auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://app:8000/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
        }

        # ── Proxy ALL /api/* requests → backend ─────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://app:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass         http://app:8000/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /docs {
            proxy_pass         http://app:8000/docs;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass         http://app:8000/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
    }

    # ── HTTPS (uncomment and set your domain / cert paths to enable) ─────────
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/ssl/certs/aisoc.crt;
    #     ssl_certificate_key /etc/ssl/private/aisoc.key;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # (copy all location blocks from the HTTP server above)
    # }
    #
    # # Redirect HTTP → HTTPS
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
}
